---
- name: Install Docker
  hosts: jenkins
  become: yes

  tasks:

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Enable Docker
      service:
        name: docker
        enabled: yes

    - name: Start Docker
      service:
        name: docker
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Verify Docker Installation
      command: docker --version
      register: docker_version
      changed_when: false

    - debug:
        var: docker_version.stdout