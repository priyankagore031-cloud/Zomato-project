---
- name: Install Jenkins
  hosts: jenkins
  become: yes

  tasks:

    - name: Install required packages
      apt:
        name:
          - curl
          - gnupg
          - fontconfig
        state: present
        update_cache: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Jenkins GPG key
      shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key \
        | gpg --dearmor -o /etc/apt/keyrings/jenkins-keyring.gpg
      args:
        creates: /etc/apt/keyrings/jenkins-keyring.gpg

    - name: Add Jenkins Repository
      copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        content: |
          deb [signed-by=/etc/apt/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Enable Jenkins
      service:
        name: jenkins
        enabled: yes

    - name: Start Jenkins
      service:
        name: jenkins
        state: started

    - name: Verify Jenkins Status
      command: systemctl is-active jenkins
      register: jenkins_status
      changed_when: false

    - debug:
        var: jenkins_status.stdout